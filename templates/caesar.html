<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher | ATTT Nâng Cao</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 3rem 0;
        }

        .page-title {
            font-weight: 800;
            text-align: center;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .page-title i {
            color: #f1c40f;
        }

        .cipher-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            height: 100%;
        }

        .cipher-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-header-custom {
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            text-transform: uppercase;
        }

        .encrypt-header { color: #0d6efd; border-bottom: 3px solid #0d6efd; }
        .decrypt-header { color: #198754; border-bottom: 3px solid #198754; }

        .form-label { font-weight: 600; color: #555; }
        .input-group-text { background-color: #f8f9fa; border-right: none; }
        .form-control { border-left: none; }
        .form-control:focus { box-shadow: none; border-color: #dee2e6; }
        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
            border-radius: 0.375rem;
        }

        .btn-custom {
            font-weight: 600;
            letter-spacing: 1px;
            padding: 0.75rem;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .result-box {
            background-color: #e9ecef;
            font-weight: 600;
            color: #dc3545; /* Màu đỏ đô cho kết quả nổi bật */
        }

        .custom-footer {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <div class="container">
            
            <h1 class="page-title"><i class="fas fa-shield-alt me-2"></i> Hệ Thống Caesar Cipher</h1>

            <div class="row g-4 justify-content-center">
                
                <div class="col-lg-5 col-md-6">
                    <div class="cipher-card">
                        <h3 class="card-header-custom encrypt-header">
                            <i class="fas fa-lock me-2"></i> Encryption
                        </h3>
                        
                        <form id="encryptForm" method="POST" action="/encrypt">
                            <div class="mb-3">
                                <label class="form-label">Plain text:</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-comment-dots text-primary"></i></span>
                                    <input type="text" class="form-control" name="inputPlainText" placeholder="Nhập văn bản cần mã hóa..." required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Key (Độ dịch chuyển):</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-key text-primary"></i></span>
                                    <input type="number" class="form-control" name="inputKeyPlain" placeholder="Nhập khóa K..." required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-custom mb-4">
                                <i class="fas fa-user-shield me-2"></i> Encrypt Now
                            </button>

                            <div>
                                <label class="form-label text-primary"><i class="fas fa-poll-h me-1"></i> Kết quả mã hóa:</label>
                                <textarea class="form-control result-box" id="encryptResult" rows="2" placeholder="Kết quả sẽ hiển thị ở đây..." readonly></textarea>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-lg-5 col-md-6">
                    <div class="cipher-card">
                        <h3 class="card-header-custom decrypt-header">
                            <i class="fas fa-unlock-alt me-2"></i> Decryption
                        </h3>
                        
                        <form id="decryptForm" method="POST" action="/decrypt">
                            <div class="mb-3">
                                <label class="form-label">Cipher text:</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-comment-slash text-success"></i></span>
                                    <input type="text" class="form-control" name="inputCipherText" placeholder="Nhập văn bản cần giải mã..." required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Key (Độ dịch chuyển):</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-key text-success"></i></span>
                                    <input type="number" class="form-control" name="inputKeyCipher" placeholder="Nhập khóa K..." required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 btn-custom mb-4">
                                <i class="fas fa-unlock me-2"></i> Decrypt Now
                            </button>

                            <div>
                                <label class="form-label text-success"><i class="fas fa-poll-h me-1"></i> Kết quả giải mã:</label>
                                <textarea class="form-control result-box" id="decryptResult" rows="2" placeholder="Kết quả sẽ hiển thị ở đây..." readonly></textarea>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="custom-footer text-white text-center py-4">
        <div class="container">
            <h5 class="mb-2 text-warning font-weight-bold">Bài thực hành An toàn thông tin nâng cao</h5>
            <p class="mb-1" style="font-size: 1.1rem;">Sinh viên thực hiện: <b class="text-info">Nguyễn Thanh Nghĩa</b></p>
            <p class="mb-0 text-light opacity-75"><i class="fas fa-university me-2"></i>Trường: HUTECH - Đại học Công Nghệ TP.HCM</p>
        </div>
    </footer>

    <script>
        // Xử lý Form Mã hóa
        document.getElementById('encryptForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Ngăn chặn hành động reload trang mặc định

            const formData = new FormData(this);
            const resultBox = document.getElementById('encryptResult');
            resultBox.value = "Đang xử lý...";

            try {
                const response = await fetch('/encrypt', {
                    method: 'POST',
                    body: formData
                });
                
                // Giả định backend trả về chuỗi text thuần túy. 
                // Nếu backend trả về JSON (vd: return Json(new { result = "..." })), bạn đổi thành:
                // const data = await response.json(); resultBox.value = data.result;
                const data = await response.text(); 
                resultBox.value = data; 
                
            } catch (error) {
                console.error('Error:', error);
                resultBox.value = "Lỗi: Không thể kết nối đến máy chủ!";
            }
        });

        // Xử lý Form Giải mã
        document.getElementById('decryptForm').addEventListener('submit', async function (e) {
            e.preventDefault(); 

            const formData = new FormData(this);
            const resultBox = document.getElementById('decryptResult');
            resultBox.value = "Đang xử lý...";

            try {
                const response = await fetch('/decrypt', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.text();
                resultBox.value = data; 
                
            } catch (error) {
                console.error('Error:', error);
                resultBox.value = "Lỗi: Không thể kết nối đến máy chủ!";
            }
        });
    </script>

</body>
</html>
